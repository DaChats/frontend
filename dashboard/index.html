<body class="Gotham" data-bs-theme="dark" style="height: 100%;" >
   

    
    <div class="row nomarginpadding" id="chat" style="height: 100%;">

                d

        </div>
        <div class="col-10 bg bg-danger "  style="height: 100%;">

                </div>
                <div class="chat-input">

                    <button class="btn btn-primary" id="send-button" style="width: 5%; float: right;">Send</button>
                </div>
            </div>
        </div>

    </div>

    <script src="../js/ws.js"></script>
