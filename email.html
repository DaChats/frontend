<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
        }
        #preview {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.0.12/marked.min.js"></script>
</head>
<body>

<h1>Email Builder</h1>

<textarea id="inputText" placeholder="Írd ide a szöveget..."></textarea>

<button type="button" onclick="kuldes()">Küldés</button>

<h2>Előnézet</h2>
<div id="preview"></div>

<script>
document.getElementById('inputText').addEventListener('input', function() {
    var inputText = document.getElementById('inputText').value;
    var formattedText = marked.parse(inputText);
    document.getElementById('preview').innerHTML = formattedText;
});

function kuldes() {
    var inputText = document.getElementById('inputText').value;
    var formattedText = marked.parse(inputText);

    console.log(formattedText);

    const token = prompt('Kérlek add meg a tokenedet:');

    if (!token) {
        alert('Nem adtál meg tokent!');
        return;
    }

    confirm('Biztosan elküldöd az emailt?')

    fetch('https://api.dachats.online/api/admin/email', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'auth': token,
        },
        body: JSON.stringify({
            subject: prompt('Kérlek add meg az email tárgyát:'),
            message: formattedText,
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Az email sikeresen elküldve!');
        } else {
            alert('Hiba történt az email küldése közben!');
        }
    })
}
</script>

</body>
</html>
